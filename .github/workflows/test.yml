name: Dolphin CI

on:
  push:
    branches: [ main, feat/** ]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    env:
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      PINECONE_API_KEY: ${{ secrets.PINECONE_API_KEY }}

      HF_TOKEN: ${{ secrets.HF_TOKEN }}
      SENTIMENT_MODEL_PATH: ${{ secrets.SENTIMENT_MODEL_PATH }}
      
      # Twitter (스모크 테스트용)
      TWITTER_API_KEY: ${{ secrets.TWITTER_API_KEY }}
      TWITTER_API_KEY_SECRET: ${{ secrets.TWITTER_API_KEY_SECRET }}
      TWITTER_ACCESS_TOKEN: ${{ secrets.TWITTER_ACCESS_TOKEN }}
      TWITTER_ACCESS_TOKEN_SECRET: ${{ secrets.TWITTER_ACCESS_TOKEN_SECRET }}
      TWITTER_BEARER_TOKEN: ${{ secrets.TWITTER_BEARER_TOKEN }}
      
      # Instiz (스모크 테스트용)
      INSTIZ_ID: ${{ secrets.INSTIZ_ID }}
      INSTIZ_PW: ${{ secrets.INSTIZ_PW }}
      
      # Kafka (Kafka 통합 테스트용)
      KAFKA_BOOTSTRAP_SERVERS: ${{ secrets.KAFKA_BOOTSTRAP_SERVERS }}
      KAFKA_API_KEY: ${{ secrets.KAFKA_API_KEY }}
      KAFKA_API_SECRET: ${{ secrets.KAFKA_API_SECRET }}
      KAFKA_TOPIC: ${{ secrets.KAFKA_TOPIC }}
      RUN_REAL_COLLECTOR: ${{ secrets.RUN_REAL_COLLECTOR || '0' }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install huggingface_hub
          python -m playwright install chromium --with-deps

      - name: Set PYTHONPATH
        run: echo "PYTHONPATH=$(pwd)" >> $GITHUB_ENV

      - name: Debug env
        run: |
          echo "=== 기본 설정 ==="
          echo "Model path: $SENTIMENT_MODEL_PATH"
          python -c "import os; print('HF_TOKEN exists:', bool(os.getenv('HF_TOKEN')))"
          python -c "import os; print('OPENAI_API_KEY exists:', bool(os.getenv('OPENAI_API_KEY')))"
          python -c "import os; print('PINECONE_API_KEY exists:', bool(os.getenv('PINECONE_API_KEY')))"
          
          echo "=== Twitter 설정 ==="
          python -c "import os; print('TWITTER_API_KEY exists:', bool(os.getenv('TWITTER_API_KEY')))"
          python -c "import os; print('TWITTER_BEARER_TOKEN exists:', bool(os.getenv('TWITTER_BEARER_TOKEN')))"
          
          echo "=== Instiz 설정 ==="
          python -c "import os; print('INSTIZ_ID exists:', bool(os.getenv('INSTIZ_ID')))"
          
          echo "=== Kafka 설정 ==="
          python -c "import os; print('KAFKA_BOOTSTRAP_SERVERS exists:', bool(os.getenv('KAFKA_BOOTSTRAP_SERVERS')))"
          python -c "import os; print('RUN_REAL_COLLECTOR:', os.getenv('RUN_REAL_COLLECTOR'))"

      - name: Run all tests (전체 테스트)
        run: pytest --tb=short -v
        continue-on-error: true